name: CI Production Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-secure:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Upgraded to checkout@v4 (compatible with modern runners)
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Security Scan with Trivy
    - name: Run Trivy FS (Source) Security Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    # Step 3: Upgraded to setup-buildx-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Step 4: Upgraded to login-action@v3
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Step 5: Upgraded to build-push-action@v6 (fully resolves Node 24 forcing)
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/gitops-fastapi-app:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/gitops-fastapi-app:${{ github.sha }}