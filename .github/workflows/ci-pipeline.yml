name: CI Production Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-secure:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clone the repository code into the GitHub Actions runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Scan the source code for critical security vulnerabilities using Trivy
    - name: Run Trivy FS (Source) Security Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '0' # Set to '1' in real production to fail the build if vulnerabilities are found
        severity: 'CRITICAL,HIGH'

    # Step 3: Set up Docker Buildx for advanced image building features
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Step 4: Authenticate with Docker Hub using securely stored repository secrets
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Step 5: Build the multi-stage production Docker image and push it to Docker Hub
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/gitops-fastapi-app:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/gitops-fastapi-app:${{ github.sha }}